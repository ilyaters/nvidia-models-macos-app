# Builds NvidiaLLM.app on macOS CI and uploads it as a downloadable artifact.
#
# This lets you get a pre-built app without any local setup: push to main (or
# trigger manually) and download the .app from the Actions run page.
#
name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # manual trigger from the Actions tab

jobs:
  build:
    name: Build macOS app
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          # Use the latest Xcode available on the runner.
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve package dependencies
        run: xcodebuild -resolvePackageDependencies -project NvidiaLLM.xcodeproj -scheme NvidiaLLM

      - name: Build
        run: |
          xcodebuild \
            -project NvidiaLLM.xcodeproj \
            -scheme NvidiaLLM \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            build

      - name: Locate built app
        id: locate
        run: |
          APP_PATH="$(find ~/Library/Developer/Xcode/DerivedData -name 'NvidiaLLM.app' -type d 2>/dev/null | head -1)"
          if [ -z "$APP_PATH" ]; then
            APP_PATH="$(find build -name 'NvidiaLLM.app' -type d 2>/dev/null | head -1)"
          fi
          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"
          echo "Found app at: $APP_PATH"

      - name: Zip app
        run: |
          cd "$(dirname "${{ steps.locate.outputs.app_path }}")"
          ditto -c -k --keepParent NvidiaLLM.app NvidiaLLM.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NvidiaLLM-app
          path: ${{ steps.locate.outputs.app_path }}/../NvidiaLLM.zip
          if-no-files-found: error
          retention-days: 30
