# XcodeGen project specification for NvidiaLLM.
#
# Generates a full NvidiaLLM.xcodeproj from this single file, so you don't have
# to create the project manually in Xcode.
#
# Usage (on macOS):
#   brew install xcodegen
#   xcodegen generate
#   open NvidiaLLM.xcodeproj
#
name: NvidiaLLM
options:
  bundleIdPrefix: com.nvidia-llm
  deploymentTarget:
    macOS: "15.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_NAME: NvidiaLLM
    PRODUCT_BUNDLE_IDENTIFIER: com.nvidia-llm.app
    INFOPLIST_FILE: Resources/Info.plist
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: NO

packages:
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.4.0"
  HotKey:
    url: https://github.com/soffes/HotKey
    from: "0.2.0"

targets:
  NvidiaLLM:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Models
      - path: Services
      - path: Chat
      - path: MenuBar
      - path: Settings
      - path: Metrics
      - path: DesignSystem
      - path: Extensions
      - path: Resources/Assets.xcassets
    dependencies:
      - package: MarkdownUI
      - package: HotKey
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.nvidia-llm.app
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: YES
        CODE_SIGNING_ALLOWED: YES

  NvidiaLLMTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: NvidiaLLM
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/NvidiaLLM.app/Contents/MacOS/NvidiaLLM"
